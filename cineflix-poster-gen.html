<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cineflix Poster Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#0b0b14;
  color:#e0e0f0;
  min-height:100vh;
  padding:16px;
}

.header{
  text-align:center;
  margin-bottom:18px;
}
.logo{
  font-family:'Bebas Neue',cursive;
  font-size:2.4rem;
  letter-spacing:8px;
  background:linear-gradient(90deg,#ff3a00,#ff9a00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo-sub{font-size:0.68rem;color:#44446a;letter-spacing:2px;text-transform:uppercase;margin-top:2px}

.wrap{
  display:grid;
  grid-template-columns:340px 1fr;
  gap:14px;
  max-width:1000px;
  margin:0 auto;
}
@media(max-width:760px){.wrap{grid-template-columns:1fr}}

.panel{
  background:#0f0f1e;
  border:1px solid #1c1c30;
  border-radius:14px;
  padding:16px;
}

.sec{
  font-size:0.6rem;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#33335a;
  border-bottom:1px solid #161626;
  padding-bottom:8px;
  margin-bottom:12px;
  margin-top:16px;
}
.sec:first-child{margin-top:0}

/* TMDB search */
.search-row{display:flex;gap:6px}
.search-row input{
  flex:1;
  background:#080814;
  border:1px solid #1c1c30;
  border-radius:8px;
  color:#d0d0ee;
  padding:9px 12px;
  font-family:'Poppins',sans-serif;
  font-size:0.82rem;
  outline:none;
}
.search-row input:focus{border-color:#ff5500}
.btn-search{
  padding:9px 16px;
  border-radius:8px;
  background:linear-gradient(135deg,#cc3300,#ff6600);
  color:#fff;
  border:none;
  font-family:'Poppins',sans-serif;
  font-size:0.8rem;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
}

/* Type toggle */
.type-row{display:flex;gap:6px;margin-bottom:12px}
.tbtn{
  flex:1;
  padding:7px;
  border-radius:8px;
  border:1px solid #1c1c30;
  background:transparent;
  color:#44446a;
  font-family:'Poppins',sans-serif;
  font-size:0.72rem;
  font-weight:700;
  cursor:pointer;
  text-align:center;
  transition:all .15s;
}
.tbtn.on{background:#1a1a3a;color:#fff;border-color:#3a3acc}

/* Results */
.results{
  max-height:180px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:5px;
  margin-top:8px;
}
.results::-webkit-scrollbar{width:4px}
.results::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:4px}
.result-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  border-radius:8px;
  border:1px solid #1a1a2e;
  background:#090914;
  cursor:pointer;
  transition:all .15s;
}
.result-item:hover{background:#13132a;border-color:#3a3acc}
.result-item.selected{background:#14142e;border-color:#6666ff}
.result-thumb{
  width:34px;height:48px;
  object-fit:cover;
  border-radius:4px;
  flex-shrink:0;
  background:#1a1a2a;
}
.result-info{flex:1;min-width:0}
.result-title{font-size:0.78rem;font-weight:700;color:#d0d0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-meta{font-size:0.65rem;color:#55557a;margin-top:2px}

label{
  display:block;
  font-size:0.65rem;
  font-weight:700;
  color:#33335a;
  letter-spacing:1px;
  text-transform:uppercase;
  margin:10px 0 4px;
}
input,select,textarea{
  width:100%;
  background:#080814;
  border:1px solid #1c1c30;
  border-radius:8px;
  color:#d0d0ee;
  padding:8px 11px;
  font-family:'Poppins',sans-serif;
  font-size:0.82rem;
  outline:none;
}
input:focus,select:focus,textarea:focus{border-color:#ff5500}
textarea{resize:vertical;min-height:60px;line-height:1.5}

/* Theme circles */
.themes{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.th{
  width:36px;height:36px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .18s;
  position:relative;
}
.th.on{border-color:#fff;transform:scale(1.15)}
.th::after{
  content:attr(data-name);
  position:absolute;
  bottom:-18px;left:50%;transform:translateX(-50%);
  font-size:0.5rem;color:#44446a;white-space:nowrap;
  font-family:'Poppins',sans-serif;font-weight:600;
}

.gen-btn{
  width:100%;margin-top:16px;
  padding:13px;border-radius:10px;
  background:linear-gradient(135deg,#cc2200,#ff5500);
  color:#fff;border:none;
  font-family:'Bebas Neue',cursive;
  font-size:1.2rem;letter-spacing:4px;
  cursor:pointer;
  box-shadow:0 4px 24px rgba(200,50,0,.35);
  transition:opacity .2s;
}
.gen-btn:hover{opacity:.88}

/* Right panel */
.preview-panel{
  display:flex;flex-direction:column;gap:12px;
}
.preview-wrap{
  background:#080814;
  border-radius:12px;
  border:1px solid #1c1c30;
  overflow:hidden;
  aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
}
.preview-wrap img,#poster-canvas{width:100%;height:100%;object-fit:cover;display:block}
.ph{text-align:center;color:#22224a;padding:20px;font-size:.85rem;line-height:2}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-btn{
  padding:11px;border-radius:9px;
  border:1px solid #1c1c30;
  background:#0f0f1e;
  color:#d0d0ee;
  font-family:'Poppins',sans-serif;
  font-size:.78rem;font-weight:700;
  cursor:pointer;transition:all .18s;
  text-align:center;
}
.act-btn:hover{background:#181830;border-color:#3a3acc}
.act-btn.green{
  background:linear-gradient(135deg,#0a2a10,#0a3a18);
  border-color:#1a6a30;color:#33ff88;
}

.text-post{
  background:#080814;
  border:1px solid #1c1c30;
  border-radius:10px;
  padding:14px;
}
.text-post pre{
  font-family:monospace;
  font-size:.78rem;
  color:#b0b0cc;
  white-space:pre-wrap;
  word-break:break-word;
  line-height:1.7;
}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ffffff33;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.ep-fields{display:none}
.ep-fields.show{display:block}

.info-chip{
  display:inline-block;
  background:#0f0f1e;
  border:1px solid #1c1c30;
  border-radius:20px;
  padding:3px 10px;
  font-size:.65rem;color:#6666aa;margin:2px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">CINEFLIX</div>
  <div class="logo-sub">Telegram HD Poster Generator · TMDB Auto-Fetch</div>
</div>

<div class="wrap">

<!-- LEFT FORM -->
<div class="panel">

  <div class="sec">🎬 Content Type</div>
  <div class="type-row">
    <div class="tbtn on" data-t="movie" onclick="setType('movie',this)">🎬 Movie</div>
    <div class="tbtn" data-t="tv" onclick="setType('tv',this)">📺 Series</div>
    <div class="tbtn" data-t="kdrama" onclick="setType('kdrama',this)">🇰🇷 K-Drama</div>
    <div class="tbtn" data-t="anime" onclick="setType('anime',this)">⛩️ Anime</div>
  </div>

  <div class="sec">🔍 TMDB Auto Search</div>
  <div class="search-row">
    <input id="q" placeholder="Movie/Series নাম লিখো..." onkeydown="if(event.key==='Enter')search()"/>
    <button class="btn-search" onclick="search()">Search</button>
  </div>
  <div class="results" id="results"></div>

  <div class="sec">📝 Details (Auto-filled)</div>

  <label>Title</label>
  <input id="f-title" placeholder="Title" />

  <label>Poster URL</label>
  <input id="f-poster" placeholder="https://image.tmdb.org/..." oninput="previewThumb()"/>

  <label>Rating (IMDb/TMDB)</label>
  <input id="f-rating" type="number" step="0.1" min="0" max="10" value="8.5"/>

  <label>Year</label>
  <input id="f-year" placeholder="2024"/>

  <label>Genre</label>
  <input id="f-genre" placeholder="Action, Thriller"/>

  <label>Duration / Episodes</label>
  <input id="f-duration" placeholder="2h 30m  or  S01 · 12 eps"/>

  <label>Quality</label>
  <select id="f-quality">
    <option>4K UHD</option>
    <option selected>1080p FHD</option>
    <option>720p HD</option>
  </select>

  <label>Audio</label>
  <input id="f-audio" value="Bengali Dubbed + English"/>

  <label>Overview / Tagline</label>
  <textarea id="f-desc" rows="3" placeholder="Short description..."></textarea>

  <div class="ep-fields" id="ep-fields">
    <label>Season</label>
    <input id="f-season" value="1" type="number"/>
    <label>Latest Episode</label>
    <input id="f-ep" placeholder="e.g. 5" type="number"/>
    <label>Total Episodes</label>
    <input id="f-total" placeholder="12 / Ongoing"/>
  </div>

  <div class="sec">🎨 Poster Theme</div>
  <div class="themes" id="themes">
    <div class="th on" data-th="flame" data-name="Flame" style="background:linear-gradient(135deg,#ff3a00,#ff9a00)" onclick="setTheme('flame',this)"></div>
    <div class="th" data-th="ocean" data-name="Ocean" style="background:linear-gradient(135deg,#0044cc,#00ccff)" onclick="setTheme('ocean',this)"></div>
    <div class="th" data-th="gold" data-name="Gold" style="background:linear-gradient(135deg,#cc9900,#ffee00)" onclick="setTheme('gold',this)"></div>
    <div class="th" data-th="mint" data-name="Mint" style="background:linear-gradient(135deg,#00aa55,#00ffaa)" onclick="setTheme('mint',this)"></div>
    <div class="th" data-th="rose" data-name="Rose" style="background:linear-gradient(135deg,#cc0066,#ff66bb)" onclick="setTheme('rose',this)"></div>
    <div class="th" data-th="violet" data-name="Violet" style="background:linear-gradient(135deg,#7700cc,#cc55ff)" onclick="setTheme('violet',this)"></div>
    <div class="th" data-th="sky" data-name="Sky" style="background:linear-gradient(135deg,#0088bb,#00eeff)" onclick="setTheme('sky',this)"></div>
    <div class="th" data-th="cherry" data-name="Cherry" style="background:linear-gradient(135deg,#bb0022,#ff4466)" onclick="setTheme('cherry',this)"></div>
  </div>
  <br>

  <label>App Name</label>
  <input id="f-app" value="Cineflix"/>
  <label>Watch Link (bot/channel)</label>
  <input id="f-link" value="t.me/CineflixBot"/>

  <button class="gen-btn" onclick="generate()">⚡ GENERATE POSTER</button>
</div>

<!-- RIGHT PREVIEW -->
<div class="preview-panel">
  <div class="panel" style="padding:10px">
    <div style="font-size:.6rem;font-weight:700;letter-spacing:2px;color:#33335a;text-transform:uppercase;margin-bottom:8px">👁️ Poster Preview (1:1 · 1080×1080)</div>
    <div class="preview-wrap" id="pw">
      <div class="ph">🎬 TMDB থেকে search করো<br>অথবা details দাও<br><br><strong>Generate Poster</strong> চাপো</div>
    </div>
  </div>

  <div class="action-row" id="act-row" style="display:none">
    <button class="act-btn green" onclick="dlPoster()">⬇️ Download HD PNG</button>
    <button class="act-btn" onclick="copyPost()">📋 Copy Text Post</button>
  </div>

  <div class="panel" id="text-panel" style="display:none">
    <div style="font-size:.6rem;font-weight:700;letter-spacing:2px;color:#33335a;text-transform:uppercase;margin-bottom:8px">📋 Telegram Text Post</div>
    <div class="text-post"><pre id="text-content"></pre></div>
  </div>
</div>

</div>

<canvas id="c" style="display:none"></canvas>

<script>
const TMDB_KEY = 'b445400ff2b0b33483ea4974026293e3';
const IMG_BASE = 'https://image.tmdb.org/t/p/';

let tmdbType = 'movie';
let theme = 'flame';
let selectedItem = null;
let lastTextPost = '';

const THEMES = {
  flame:  {a1:'#ff3a00', a2:'#ff9a00', txt:'#fff8f0', badge:'#ff5500'},
  ocean:  {a1:'#0055ff', a2:'#00ccff', txt:'#f0f8ff', badge:'#0088ff'},
  gold:   {a1:'#cc8800', a2:'#ffdd00', txt:'#fffaf0', badge:'#ddaa00'},
  mint:   {a1:'#00aa55', a2:'#00ffaa', txt:'#f0fff8', badge:'#00cc77'},
  rose:   {a1:'#dd0066', a2:'#ff77bb', txt:'#fff0f8', badge:'#ee3388'},
  violet: {a1:'#8800cc', a2:'#cc66ff', txt:'#f8f0ff', badge:'#aa44ee'},
  sky:    {a1:'#0099cc', a2:'#00eeff', txt:'#f0fbff', badge:'#00bbdd'},
  cherry: {a1:'#cc0033', a2:'#ff5577', txt:'#fff0f2', badge:'#ee2255'},
};

const TYPE_LABEL = {movie:'MOVIE', tv:'WEB SERIES', kdrama:'K-DRAMA', anime:'ANIME'};
const TYPE_EMOJI = {movie:'🎬', tv:'📺', kdrama:'🇰🇷', anime:'⛩️'};

function setType(t, el) {
  tmdbType = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  const ep = document.getElementById('ep-fields');
  ep.className = t !== 'movie' ? 'ep-fields show' : 'ep-fields';
}

function setTheme(t, el) {
  theme = t;
  document.querySelectorAll('.th').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

// ── TMDB Search ───────────────────────────────────────────────────────────────
async function search() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const res = document.getElementById('results');
  res.innerHTML = '<div style="color:#555577;font-size:.78rem;padding:8px"><span class="spinner"></span>Searching...</div>';

  const apiType = tmdbType === 'movie' ? 'movie' : 'tv';
  try {
    const r = await fetch(`https://api.themoviedb.org/3/search/${apiType}?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=en-US`);
    const d = await r.json();
    const items = (d.results || []).slice(0, 8);
    if (!items.length) { res.innerHTML = '<div style="color:#555577;font-size:.78rem;padding:8px">কিছু পাওয়া যায়নি</div>'; return; }
    res.innerHTML = '';
    items.forEach(item => {
      const title = item.title || item.name || 'Unknown';
      const year = (item.release_date || item.first_air_date || '').slice(0, 4);
      const thumb = item.poster_path ? IMG_BASE + 'w92' + item.poster_path : '';
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `
        ${thumb ? `<img class="result-thumb" src="${thumb}" onerror="this.style.opacity=0">` : '<div class="result-thumb"></div>'}
        <div class="result-info">
          <div class="result-title">${title}</div>
          <div class="result-meta">${year} · ⭐ ${item.vote_average?.toFixed(1)||'N/A'}</div>
        </div>`;
      div.onclick = () => selectItem(item, div);
      res.appendChild(div);
    });
  } catch(e) {
    res.innerHTML = '<div style="color:#aa3333;font-size:.78rem;padding:8px">Error: ' + e.message + '</div>';
  }
}

async function selectItem(item, el) {
  document.querySelectorAll('.result-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedItem = item;

  const apiType = tmdbType === 'movie' ? 'movie' : 'tv';
  // Fetch full details
  try {
    const r = await fetch(`https://api.themoviedb.org/3/${apiType}/${item.id}?api_key=${TMDB_KEY}&language=en-US`);
    const d = await r.json();

    const title = d.title || d.name || '';
    const year = (d.release_date || d.first_air_date || '').slice(0, 4);
    const rating = d.vote_average ? d.vote_average.toFixed(1) : '8.5';
    const genres = (d.genres || []).map(g => g.name).join(', ');
    const overview = d.overview || '';
    const runtime = d.runtime ? `${Math.floor(d.runtime/60)}h ${d.runtime%60}m` : (d.episode_run_time?.[0] ? `~${d.episode_run_time[0]}m/ep` : '');
    const seasons = d.number_of_seasons ? `S${d.number_of_seasons} · ${d.number_of_episodes} eps` : '';
    const posterUrl = d.poster_path ? IMG_BASE + 'w500' + d.poster_path : '';

    document.getElementById('f-title').value = title;
    document.getElementById('f-poster').value = posterUrl;
    document.getElementById('f-rating').value = rating;
    document.getElementById('f-year').value = year;
    document.getElementById('f-genre').value = genres;
    document.getElementById('f-duration').value = runtime || seasons;
    document.getElementById('f-desc').value = overview.slice(0, 180);
  } catch(e) {
    // fallback to basic
    document.getElementById('f-title').value = item.title || item.name || '';
    document.getElementById('f-rating').value = item.vote_average?.toFixed(1) || '8.5';
    document.getElementById('f-year').value = (item.release_date || item.first_air_date || '').slice(0,4);
    document.getElementById('f-poster').value = item.poster_path ? IMG_BASE + 'w500' + item.poster_path : '';
  }
}

// ── Canvas helpers ────────────────────────────────────────────────────────────
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function hex2rgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:255,g:255,b:255}}
function rgba(h,a){const {r,g,b}=hex2rgb(h);return `rgba(${r},${g},${b},${a})`}

function wrapText(ctx, text, x, y, maxW, lh, maxLines=3) {
  if (!text) return 0;
  const words = text.split(' ');
  let line='', lines=[];
  for (const w of words) {
    const test = line+w+' ';
    if (ctx.measureText(test).width>maxW && line) { lines.push(line.trim()); line=w+' '; }
    else line=test;
  }
  if (line.trim()) lines.push(line.trim());
  lines = lines.slice(0, maxLines);
  lines.forEach((l,i) => ctx.fillText(l, x, y+i*lh));
  return lines.length;
}

function loadImg(url) {
  return new Promise((res,rej)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img); img.onerror=()=>{
      const p=new Image(); p.crossOrigin='anonymous';
      p.onload=()=>res(p); p.onerror=rej;
      p.src='https://images.weserv.nl/?url='+encodeURIComponent(url)+'&output=jpg&w=600&h=900&fit=cover';
    };
    img.src=url;
  });
}

// ── MAIN GENERATE ─────────────────────────────────────────────────────────────
async function generate() {
  const T = THEMES[theme];
  const S = 1080; // 1:1
  const c = document.getElementById('c');
  c.width=S; c.height=S;
  const ctx = c.getContext('2d');

  // Collect inputs
  const title    = document.getElementById('f-title').value || 'UNTITLED';
  const posterUrl= document.getElementById('f-poster').value.trim();
  const rating   = document.getElementById('f-rating').value || '8.5';
  const year     = document.getElementById('f-year').value || '';
  const genre    = document.getElementById('f-genre').value || '';
  const duration = document.getElementById('f-duration').value || '';
  const quality  = document.getElementById('f-quality').value;
  const audio    = document.getElementById('f-audio').value || 'Bengali + English';
  const desc     = document.getElementById('f-desc').value || '';
  const appName  = document.getElementById('f-app').value || 'Cineflix';
  const link     = document.getElementById('f-link').value || 't.me/CineflixBot';
  const season   = document.getElementById('f-season').value || '1';
  const ep       = document.getElementById('f-ep').value || '';
  const totalEp  = document.getElementById('f-total').value || '';
  const isMovie  = tmdbType === 'movie';

  // ── BG: white/light base so thumbnail is vivid ────────────────────────────
  ctx.fillStyle = '#f8f8f8';
  ctx.fillRect(0,0,S,S);

  // ── POSTER IMAGE: top 68% of canvas ──────────────────────────────────────
  const imgH = Math.round(S * 0.68);
  if (posterUrl) {
    try {
      const img = await loadImg(posterUrl);
      // Cover crop centred
      const scale = Math.max(S/img.width, imgH/img.height);
      const sw=S/scale, sh=imgH/scale;
      const sx=(img.width-sw)/2, sy=(img.height-sh)/2;
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,S,imgH); ctx.clip();
      ctx.drawImage(img,sx,sy,sw,sh,0,0,S,imgH);
      ctx.restore();
    } catch { drawPh(ctx,S,imgH,T); }
  } else { drawPh(ctx,S,imgH,T); }

  // Light gradient overlay at bottom of image for text readability
  const fadeH = imgH;
  const fade = ctx.createLinearGradient(0, imgH*0.5, 0, imgH);
  fade.addColorStop(0,'rgba(0,0,0,0)');
  fade.addColorStop(0.7,'rgba(0,0,0,0.38)');
  fade.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=fade; ctx.fillRect(0,0,S,fadeH);

  // ── TOP LEFT: BRAND ───────────────────────────────────────────────────────
  ctx.save();
  // Semi-transparent pill behind brand name
  ctx.font = '700 22px Poppins,sans-serif';
  const brandW = ctx.measureText(appName.toUpperCase()).width + 28;
  rr(ctx,28,24,brandW,36,18);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.textBaseline='middle';
  ctx.fillText(appName.toUpperCase(),42,42);
  ctx.restore();

  // ── TOP RIGHT: TYPE BADGE ─────────────────────────────────────────────────
  ctx.save();
  const typeLabel = TYPE_LABEL[tmdbType];
  ctx.font = '800 20px Poppins,sans-serif';
  const tbw = ctx.measureText(typeLabel).width + 28;
  rr(ctx,S-tbw-28,24,tbw,36,18);
  const tbg = ctx.createLinearGradient(S-tbw-28,0,S-28,0);
  tbg.addColorStop(0,T.a1); tbg.addColorStop(1,T.a2);
  ctx.fillStyle=tbg; ctx.fill();
  ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.fillText(typeLabel, S-tbw/2-28, 42);
  ctx.restore();

  // ── BOTTOM CONTENT SECTION: white card ────────────────────────────────────
  const cardY = imgH;
  const cardH = S - imgH;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, cardY, S, cardH);

  // Accent top border line on card
  const lineG = ctx.createLinearGradient(0,cardY,S,cardY);
  lineG.addColorStop(0,T.a1); lineG.addColorStop(1,T.a2);
  ctx.fillStyle=lineG; ctx.fillRect(0,cardY,S,4);

  // ── TITLE ─────────────────────────────────────────────────────────────────
  const px = 36;
  let curY = cardY + 30;

  // Episode badge (series only)
  if (!isMovie && ep) {
    const epTxt = `S${season} · EP${ep}${totalEp?' / '+totalEp:''}  NEW`;
    ctx.save();
    ctx.font='700 19px Poppins,sans-serif';
    const epW=ctx.measureText(epTxt).width+26;
    rr(ctx,px,curY,epW,32,8);
    const epg=ctx.createLinearGradient(px,0,px+epW,0);
    epg.addColorStop(0,T.a1); epg.addColorStop(1,T.a2);
    ctx.fillStyle=epg; ctx.fill();
    ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.textAlign='left';
    ctx.fillText(epTxt, px+13, curY+16);
    ctx.restore();
    curY += 44;
  }

  // Title
  ctx.save();
  ctx.textBaseline='top'; ctx.textAlign='left';
  const titleFontSize = title.length>22 ? 52 : title.length>14 ? 62 : 72;
  ctx.font=`800 ${titleFontSize}px 'Barlow Condensed',sans-serif`;
  ctx.fillStyle='#111111';
  const titleLines = wrapText(ctx, title.toUpperCase(), px, curY, S-px*2, titleFontSize*1.1, 2);
  curY += titleLines * (titleFontSize*1.1) + 10;
  ctx.restore();

  // ── META PILLS ────────────────────────────────────────────────────────────
  ctx.save();
  ctx.font='600 18px Poppins,sans-serif';
  ctx.textBaseline='middle';
  const metas = [
    year && {icon:'📅',val:year},
    {icon:'⭐',val:parseFloat(rating).toFixed(1)+'/10'},
    quality && {icon:'🎯',val:quality},
    duration && {icon:'⏱',val:duration},
  ].filter(Boolean);

  let mx=px;
  for (const m of metas) {
    const txt=`${m.icon} ${m.val}`;
    const mw=ctx.measureText(txt).width+22;
    if (mx+mw > S-px) break;
    rr(ctx,mx,curY,mw,32,16);
    ctx.fillStyle='#f0f0f8'; ctx.fill();
    ctx.strokeStyle='#e0e0ee'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#333344'; ctx.fillText(txt,mx+11,curY+16);
    mx+=mw+8;
  }
  curY+=44;
  ctx.restore();

  // Genre + Audio line
  if (genre || audio) {
    ctx.save();
    ctx.font='500 17px Poppins,sans-serif';
    ctx.fillStyle='#888899'; ctx.textBaseline='top'; ctx.textAlign='left';
    const infoTxt = [genre, audio].filter(Boolean).join('  ·  ');
    ctx.fillText(infoTxt.slice(0,62), px, curY);
    curY += 26;
    ctx.restore();
  }

  // Description
  if (desc && cardY + cardH - curY > 80) {
    ctx.save();
    ctx.font='400 17px Poppins,sans-serif';
    ctx.fillStyle='#666677'; ctx.textBaseline='top'; ctx.textAlign='left';
    wrapText(ctx, desc, px, curY, S-px*2, 24, 2);
    ctx.restore();
  }

  // ── WATCH NOW BUTTON ──────────────────────────────────────────────────────
  const btnH = 68;
  const btnY = S - btnH - 28;
  const btnX = px;
  const btnW = S - px*2;

  rr(ctx, btnX, btnY, btnW, btnH, 16);
  const btnG = ctx.createLinearGradient(btnX,0,btnX+btnW,0);
  btnG.addColorStop(0,T.a1); btnG.addColorStop(1,T.a2);
  ctx.fillStyle=btnG; ctx.fill();

  // WATCH NOW text
  ctx.save();
  ctx.font="900 30px 'Bebas Neue',cursive";
  ctx.letterSpacing='4px';
  ctx.fillStyle='#ffffff';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▶  WATCH NOW  —  ' + link, btnX+btnW/2, btnY+btnH/2);
  ctx.restore();

  // ── RENDER ────────────────────────────────────────────────────────────────
  const pw = document.getElementById('pw');
  const img = document.createElement('img');
  img.src = c.toDataURL('image/png',1.0);
  img.style.cssText='width:100%;height:100%;object-fit:contain;display:block;border-radius:0';
  pw.innerHTML=''; pw.appendChild(img);

  document.getElementById('act-row').style.display='grid';

  // Build text post
  const epLine = !isMovie&&ep ? `\n✅ Season ${season} Episode ${ep} Added!${totalEp?' ('+totalEp+' eps)':''}` : '';
  lastTextPost=`${TYPE_EMOJI[tmdbType]} *${title}*${year?' ('+year+')':''}${epLine}

🎯 Quality: ${quality}
🔊 Audio: ${audio}${genre?'\n🎭 Genre: '+genre:''}${duration?'\n⏱ '+duration:''}
⭐ Rating: ${rating}/10

${desc?'📝 '+desc.slice(0,120)+'...\n\n':''}👉 Watch on *${appName}*: ${link}

#${appName.replace(/\s/g,'')} #${tmdbType==='movie'?'Movie':tmdbType==='kdrama'?'KDrama':tmdbType==='anime'?'Anime':'WebSeries'} #Bengali #${quality.replace(/\s/g,'')}`;

  document.getElementById('text-content').textContent = lastTextPost;
  document.getElementById('text-panel').style.display='block';
}

function drawPh(ctx,W,H,T) {
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,rgba(T.a1,0.15)); g.addColorStop(1,rgba(T.a2,0.1));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.font='80px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🎬',W/2,H/2);
  ctx.font='500 22px Poppins,sans-serif';
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillText('Add poster URL above',W/2,H/2+60);
}

function dlPoster() {
  const c=document.getElementById('c');
  const a=document.createElement('a');
  a.download=(document.getElementById('f-title').value||'cineflix')+'-poster.png';
  a.href=c.toDataURL('image/png',1.0); a.click();
}

function copyPost() {
  if (!lastTextPost) return;
  navigator.clipboard.writeText(lastTextPost).then(()=>{
    const b=document.querySelectorAll('.act-btn')[1];
    b.textContent='✅ Copied!'; b.style.color='#44ff88';
    setTimeout(()=>{b.textContent='📋 Copy Text Post';b.style.color=''},2000);
  });
}

function previewThumb() { /* live thumb preview future */ }
</script>
